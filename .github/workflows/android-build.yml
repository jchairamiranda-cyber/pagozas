name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

  # Permite ejecutar este flujo de trabajo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Compilar el APK (Debug)
      # Usamos el comando gradle directamente en vez de gradlew
      run: gradle assembleDebug

    - name: Subir APK como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: pagozas-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
